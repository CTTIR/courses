# Single source of truth for the 80 lab pages in the four-course
# curriculum. Each lab is hand-tagged with 4–6 content keywords that
# reflect the methods, tools, and concepts covered. Build_graph.py
# additionally derives cross-cutting "method-family" tags from each
# lab's title via regex, so the rendered graph connects labs across
# courses (e.g. anything touching "regression" clusters together
# regardless of which course it lives in).
#
# Conventions:
#   - kebab-case, lower-case
#   - prefer specific over generic (`logistic-regression` over `glm`
#     when the lab is specifically about logistic)
#   - reuse existing tags; new tags only when nothing fits
#   - 4–6 entries per lab — tight enough to be a real signal,
#     wide enough to make the graph dense.

